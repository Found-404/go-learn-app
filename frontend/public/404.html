<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script type="text/javascript">
    // 获取当前 URL 的路径部分
    var path = window.location.pathname;
    // 获取仓库名，例如 /go-learn-app/
    var repoName = path.substring(0, path.lastIndexOf('/') + 1);
    // 构建新的 URL，将路径部分添加到 hash 中
    var newUrl = window.location.protocol + "//" + window.location.host + repoName + "#" + path.substring(repoName.length);
    // 执行重定向
    window.location.replace(newUrl);
  </script>
</head>
<body>
  <p>If you are not redirected automatically, follow this <a id="redirectLink" href="#">link</a>.</p>
  <script type="text/javascript">
    document.getElementById('redirectLink').href = newUrl;
  </script>
</body>
</html>
